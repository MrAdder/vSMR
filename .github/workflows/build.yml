name: Build

on:
  push:
    branches: [main,master,dev,develop]
  pull_request:
    branches: [main,master,dev,develop]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-2025
    concurrency:
      group: vsmr-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: .\scripts\ci-smoke.ps1
        shell: pwsh

      - name: Setup MSBuild Path
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get changed C/C++ files
        if: github.event_name == 'pull_request'
        id: changed-files
        uses: Ana06/get-changed-files@v2.3.0
        with:
          filter: |
            vSMR/**/*.cpp
            vSMR/**/*.h
            vSMR/**/*.hpp

      - name: Install clang-format
        if: github.event_name == 'pull_request'
        run: python -m pip install --disable-pip-version-check clang-format==19.1.7

      - name: Clang Format
        if: github.event_name == 'pull_request'
        run: |
          $raw = "${{ steps.changed-files.outputs.added_modified }}"
          $files = $raw -split "[,\r\n]" | ForEach-Object { $_.Trim() } | Where-Object { $_ -and (Test-Path $_) }

          if ($files.Count -gt 0) {
            clang-format --style=file --dry-run -Werror $files
          } else {
            Write-Host "No changed C/C++ files to lint."
          }
        shell: pwsh

      - name: Get Changed Files (Src)
        if: github.event_name == 'pull_request'
        id: changed-files-src
        uses: Ana06/get-changed-files@v2.3.0
        with:
          filter: |
            vSMR/**/*.cpp

      - name: Clang Tidy (Src)
        continue-on-error: true
        if: false
        run: |
          $raw = "${{ steps.changed-files-src.outputs.added_modified }}"
          $files = $raw -split "[,\r\n]" | ForEach-Object { $_.Trim() } | Where-Object { $_ -and (Test-Path $_) }

          if ($files.Count -gt 0) {
            clang-tidy $files -p build
          } else {
            Write-Host "No changed source files for clang-tidy."
          }
        shell: pwsh

      - name: Install Conan
        run: python -m pip install --disable-pip-version-check conan==2.26.1

      - name: Restore Conan cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.conan2/p
            ~/.conan2/extensions
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install Conan dependencies
        run: |
          conan profile detect --force
          conan install . --output-folder=conan --build=missing `
            -s os=Windows `
            -s arch=x86 `
            -s compiler=msvc `
            -s compiler.version=193 `
            -s compiler.runtime=static `
            -s compiler.runtime_type=Release `
            -s compiler.cppstd=17 `
            -s build_type=Release
        shell: pwsh

      - name: Update Build Version
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = if ($env:GITHUB_REF -like "refs/tags/*") {
            $env:GITHUB_REF -replace "refs/tags/", ""
          } else {
            "dev-$($env:GITHUB_RUN_NUMBER)-$shortSha"
          }

          (Get-Content -Path "vSMR\SMRPlugin.hpp") `
            -replace '#define MY_PLUGIN_VERSION.*', "#define MY_PLUGIN_VERSION   `"$version`"" `
            | Set-Content -Path "vSMR\SMRPlugin.hpp"

          (Get-Content -Path "vSMR\vSMR.rc") `
            -replace '@build_version', $version `
            | Set-Content -Path "vSMR\vSMR.rc"
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A Win32 `
            "-DCMAKE_TOOLCHAIN_FILE=conan/conan_toolchain.cmake" `
            "-DCMAKE_BUILD_TYPE=Release"
        shell: pwsh

      - name: Build DLL
        run: cmake --build build --config Release --target vSMR --parallel
        shell: pwsh

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure
        shell: pwsh

      - name: Stage DLL artifact
        id: stage_artifact
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          if ($env:GITHUB_REF -like "refs/tags/*") {
            Copy-Item Release\vSMR.dll dist\vSMR.dll -Force
            "artifact_name=vSMR.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "artifact_path=dist/vSMR.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Copy-Item Release\vSMR.dll dist\vSMR-nightly.dll -Force
            "artifact_name=vSMR-nightly.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "artifact_path=dist/vSMR-nightly.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
        shell: pwsh

      # Upload artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.stage_artifact.outputs.artifact_name }}
          path: ${{ steps.stage_artifact.outputs.artifact_path }}

      - name: Upload to Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/vSMR.dll
