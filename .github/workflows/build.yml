name: Build

on:
  push:
    branches:
      - main
      - master
      - alpha
      - beta
      - dev
      - develop
  pull_request:
  release:
    types: [published]

jobs:
  build:
    name: Build (Win32)
    runs-on: windows-latest
    concurrency:
      group: vsmr-build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: |
            vcpkg
            C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vsmr-vcpkg-${{ runner.os }}-bdd229e13c66fa11acdc0bc8fed8e7474cd24aa5-curl-x86-windows-static

      - name: Bootstrap vcpkg
        if: steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          Set-Location vcpkg
          git checkout bdd229e13c66fa11acdc0bc8fed8e7474cd24aa5
          .\bootstrap-vcpkg.bat

      - name: Ensure vcpkg is bootstrapped
        if: steps.cache-vcpkg.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          if (-not (Test-Path .\vcpkg\vcpkg.exe)) {
            Set-Location vcpkg
            .\bootstrap-vcpkg.bat
          }

      - name: Install libcurl (x86 static)
        shell: pwsh
        run: .\vcpkg\vcpkg.exe install curl[core,ssl] --triplet x86-windows-static

      - name: Integrate vcpkg with MSBuild
        shell: pwsh
        run: .\vcpkg\vcpkg.exe integrate install

      - name: Update plugin version from tag
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          (Get-Content -Path 'vSMR\SMRPlugin.hpp') -replace '#define MY_PLUGIN_VERSION.*', "#define MY_PLUGIN_VERSION   `\"$tag`\"" | Set-Content -Path 'vSMR\SMRPlugin.hpp'

      - name: Build DLL
        shell: pwsh
        run: msbuild vSMR.sln /p:Configuration=Release /p:Platform='Win32' /p:VcpkgTriplet=x86-windows-static /m

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: vSMR.dll
          path: Release/vSMR.dll

      - name: Upload to GitHub Release
        if: github.event_name == 'release' && github.event.action == 'published'
        uses: softprops/action-gh-release@v2
        with:
          files: Release/vSMR.dll
