name: Build

on:
  push:
    branches: [main,master,dev,develop]
  pull_request:
    branches: [main,master,dev,develop]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-2025
    concurrency:
      group: vsmr-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run smoke tests
        run: .\scripts\ci-smoke.ps1
        shell: pwsh

      - name: Setup MSBuild Path
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      # Environment things
      - name: Install VC++ 2010 Redistributables (x86 and x64)
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout bdd229e13c66fa11acdc0bc8fed8e7474cd24aa5
          .\bootstrap-vcpkg.bat

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg\downloads
            vcpkg\packages
            vcpkg\installed
          key: ${{ runner.os }}-vcpkg-bdd229e13c66fa11acdc0bc8fed8e7474cd24aa5-x86-windows-static
          restore-keys: |
            ${{ runner.os }}-vcpkg-bdd229e13c66fa11acdc0bc8fed8e7474cd24aa5-

      - name: Check Clang Version
        run: clang-cl --version

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      # cURL
      - name: Cache cURL
        id: cache-curl
        uses: actions/cache@v5
        with:
          path: "C:\\hostedtoolcache\\windows\\libcurl"
          key: "ukcp-curl-build"

      - name: Download and Build cURL
        if: steps.cache-curl.outputs.cache-hit != 'true'
        env:
          CURL_DOWNLOAD_URL: "https://github.com/curl/curl/releases/download/curl-7_76_1/curl-7.76.1.zip"
          CURL_VERSION: 7.76.1
        run: |
          .\vcpkg\vcpkg.exe install curl[core,ssl] --triplet x86-windows-static

      - name: Setup cURL Environment
        env:
          CURL_VERSION: 7.76.1
        run: |
          .\vcpkg\vcpkg.exe integrate install

      - name: Update Build Version
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = if ($env:GITHUB_REF -like "refs/tags/*") {
            $env:GITHUB_REF -replace "refs/tags/", ""
          } else {
            "dev-$($env:GITHUB_RUN_NUMBER)-$shortSha"
          }

          (Get-Content -Path "vSMR\SMRPlugin.hpp") `
            -replace '#define MY_PLUGIN_VERSION.*', "#define MY_PLUGIN_VERSION   `"$version`"" `
            | Set-Content -Path "vSMR\SMRPlugin.hpp"

          (Get-Content -Path "vSMR\vSMR.rc") `
            -replace '@build_version', $version `
            | Set-Content -Path "vSMR\vSMR.rc"
        shell: pwsh

      - name: Build DLL
        run: msbuild vSMR.sln /p:Configuration=Release /p:Platform=Win32 /p:VcpkgTriplet=x86-windows-static /m

      - name: Stage DLL artifact
        id: stage_artifact
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null

          if ($env:GITHUB_REF -like "refs/tags/*") {
            Copy-Item Release\vSMR.dll dist\vSMR.dll -Force
            "artifact_name=vSMR.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "artifact_path=dist/vSMR.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Copy-Item Release\vSMR.dll dist\vSMR-nightly.dll -Force
            "artifact_name=vSMR-nightly.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "artifact_path=dist/vSMR-nightly.dll" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }
        shell: pwsh

      # Upload artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.stage_artifact.outputs.artifact_name }}
          path: ${{ steps.stage_artifact.outputs.artifact_path }}

      - name: Upload to Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/vSMR.dll
